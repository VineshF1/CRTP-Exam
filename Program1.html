<!DOCTYPE html>
<html lang="en">
<head>
  <title>My Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }
    nav {
      background: #333;
      padding: 10px;
      display: flex;
      justify-content: space-between;
    }
    nav h2 {
      color: white;
    }
    nav ul {
      list-style: none;
      display: flex;
    }
    nav ul li {
      margin: 0 10px;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      padding: 5px;
    }
    nav ul li a:hover {
      background: orange;
      border-radius: 5px;
    }
    header {
      text-align: center;
      padding: 50px;
      background: lightblue;
    }
    section {
      padding: 20px;
      text-align: center;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .gallery img {
      width: 200px;
      margin: 10px;
      border-radius: 10px;
    }
    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
    }
    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        text-align: center;
      }
      .gallery {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>
  <nav>
    <h2>MyPortfolio</h2>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Gallery</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
  <header>
    <h1>Welcome to My Portfolio</h1>
    <p>I am a Web Developer</p>
  </header>
  <section>
    <h2>About Me</h2>
    <p>This is a simple responsive portfolio webpage.</p>
  </section>
  <section>
    <h2>Gallery</h2>
    <div class="gallery">
      <img src="https://via.placeholder.com/200">
      <img src="https://via.placeholder.com/200">
      <img src="https://via.placeholder.com/200">
    </div>
  </section>
  <footer>
    <p>Contact: email@gmail.com</p>
  </footer>
</body>
</html>
